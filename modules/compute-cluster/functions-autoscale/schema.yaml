title: "RDMA autoscale overlay"
description: "Creates autoscale IAM plus optional OCI Function + alarm trigger wiring."
informationalText: |
  This stack overlays autoscaling controls on top of an existing RDMA platform deployment.
  It does not deploy systemd timers or management-node runtime scripts.
schemaVersion: 1.1.0
version: "20190304"
locale: "en"

variableGroups:
  - title: "Target"
    variables:
      - compartment_ocid
      - management_instance_ocid
      - resource_manager_stack_id
      - resource_manager_region

  - title: "IAM"
    variables:
      - name_prefix
      - resource_manager_stack_compartment_ocid
      - enable_memory_autoscale_iam

  - title: "Scaling policy"
    variables:
      - memory_scale_threshold_percent
      - memory_scale_window_minutes
      - memory_scale_rule
      - memory_scale_cooldown_minutes
      - memory_node_max_count
      - memory_autoscale_dry_run

  - title: "Function runtime"
    variables:
      - enable_function_autoscale
      - function_application_name
      - function_name
      - function_application_subnet_ids
      - function_image_uri
      - function_image_ocir_uri
      - function_memory_in_mbs
      - function_timeout_in_seconds
      - function_application_shape

  - title: "Function trigger"
    variables:
      - enable_function_alarm_trigger
      - function_alarm_query_override
      - function_alarm_pending_duration

  - title: "Docker build (optional)"
    variables:
      - enable_function_image_build
      - function_source_dir
      - ocir_registry
      - ocir_username
      - ocir_auth_token

variables:
  tenancy_ocid:
    type: string
    title: "Tenancy OCID"
    required: true
    visible: false

  region:
    type: oci:identity:region:name
    title: "Region"
    required: true
    visible: false

  identity_home_region:
    type: oci:identity:region:name
    title: "Identity home region"
    default: "us-phoenix-1"
    required: false
    visible: false

  compartment_ocid:
    type: oci:identity:compartment:id
    title: "RDMA compartment"
    required: true
    dependsOn:
      compartmentId: ${tenancy_ocid}

  management_instance_ocid:
    type: string
    title: "Management instance OCID (recommended)"
    required: false
    default: ""

  resource_manager_stack_id:
    type: string
    title: "Resource Manager stack OCID"
    description: "Target stack to update with memory_node_count scaling apply jobs."
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  resource_manager_region:
    type: oci:identity:region:name
    title: "RM stack region"
    description: "Region of the target Resource Manager stack. Empty uses region."
    required: false
    default: ""
    visible:
      eq:
        - enable_function_autoscale
        - true

  name_prefix:
    type: string
    title: "Name prefix"
    description: "Prefix used for IAM and alarm resource names."
    default: "kove-rdma"
    required: false

  resource_manager_stack_compartment_ocid:
    type: oci:identity:compartment:id
    title: "RM stack compartment OCID (optional)"
    description: "Compartment containing the target Resource Manager stack. Empty uses RDMA compartment."
    required: false
    default: ""
    dependsOn:
      compartmentId: ${tenancy_ocid}

  enable_memory_autoscale_iam:
    type: boolean
    title: "Create autoscale IAM"
    default: true
    required: false

  memory_scale_threshold_percent:
    type: number
    title: "Scale threshold (%)"
    default: 80
    required: false

  memory_scale_window_minutes:
    type: number
    title: "Scale window (minutes)"
    default: 5
    required: false

  memory_scale_rule:
    type: enum
    title: "Scale rule"
    enum:
      - all_nodes
      - any_node
      - average_nodes
    default: "all_nodes"
    required: false

  memory_scale_cooldown_minutes:
    type: number
    title: "Cooldown (minutes)"
    default: 20
    required: false

  memory_node_max_count:
    type: number
    title: "Max memory nodes"
    default: 8
    required: false

  memory_autoscale_dry_run:
    type: boolean
    title: "Dry run"
    default: false
    required: false

  enable_function_autoscale:
    type: boolean
    title: "Enable function autoscale"
    default: false
    required: false

  function_application_name:
    type: string
    default: "rdma-memory-autoscale-app"
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_name:
    type: string
    default: "rdma-memory-autoscale"
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_application_subnet_ids:
    type: array
    title: "Function subnet OCIDs"
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true
    items:
      type: string

  function_image_uri:
    type: string
    title: "Function image URI"
    default: ""
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_image_ocir_uri:
    type: string
    title: "Function image OCIR URI (build target)"
    default: ""
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_memory_in_mbs:
    type: number
    title: "Function memory (MB)"
    default: 512
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_timeout_in_seconds:
    type: number
    title: "Function timeout (seconds)"
    default: 120
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_application_shape:
    type: string
    title: "Function application shape"
    default: "GENERIC_X86"
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  enable_function_alarm_trigger:
    type: boolean
    title: "Enable alarm trigger"
    default: false
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_alarm_query_override:
    type: string
    title: "Alarm query override (optional)"
    default: ""
    required: false
    visible:
      and:
        - eq:
            - enable_function_autoscale
            - true
        - eq:
            - enable_function_alarm_trigger
            - true

  function_alarm_pending_duration:
    type: string
    title: "Alarm pending duration"
    default: "PT5M"
    required: false
    visible:
      and:
        - eq:
            - enable_function_autoscale
            - true
        - eq:
            - enable_function_alarm_trigger
            - true

  enable_function_image_build:
    type: boolean
    title: "Build image during apply"
    default: false
    required: false
    visible:
      eq:
        - enable_function_autoscale
        - true

  function_source_dir:
    type: string
    title: "Function source dir"
    default: "function"
    required: false
    visible:
      and:
        - eq:
            - enable_function_autoscale
            - true
        - eq:
            - enable_function_image_build
            - true

  ocir_registry:
    type: string
    title: "OCIR registry"
    default: ""
    required: false
    visible:
      and:
        - eq:
            - enable_function_autoscale
            - true
        - eq:
            - enable_function_image_build
            - true

  ocir_username:
    type: string
    title: "OCIR username"
    default: ""
    required: false
    visible:
      and:
        - eq:
            - enable_function_autoscale
            - true
        - eq:
            - enable_function_image_build
            - true

  ocir_auth_token:
    type: string
    title: "OCIR auth token"
    default: ""
    required: false
    visible:
      and:
        - eq:
            - enable_function_autoscale
            - true
        - eq:
            - enable_function_image_build
            - true

outputs:
  memory_autoscale_dynamic_group_ocid:
    title: "Dynamic group OCID"
    visible: true
  memory_autoscale_dynamic_group_name:
    title: "Dynamic group name"
    visible: true
  memory_autoscale_policy_ocid:
    title: "IAM policy OCID"
    visible: true
  resource_manager_stack_compartment_ocid_effective:
    title: "Effective RM stack compartment"
    visible: true
  function_autoscale_enabled:
    title: "Function autoscale enabled"
    visible: true
  function_autoscale_application_id:
    title: "Function application OCID"
    visible: true
  function_autoscale_function_id:
    title: "Function OCID"
    visible: true
  function_autoscale_image_uri_effective:
    title: "Function image URI"
    visible: true
  function_alarm_trigger_enabled:
    title: "Function alarm trigger enabled"
    visible: true
