title: "Kove RDMA Platform"
description: "Kove RDMA platform with one MC/management instance, RDMA memory nodes, optional compute-system BM, optional bastion, and new or existing OCI networking."
schemaVersion: 1.1.0
version: "20190304"
locale: "en"

variableGroups:
  - title: "Hidden (ORM-injected)"
    visible: false
    variables:
      - tenancy_ocid
      - region

  - title: "Target"
    variables:
      - compartment_ocid
      - ssh_public_key
      - rhel8_10_image_ocid
      - bm_node_custom_image_ocid
      - mc_custom_image_ocid
      - bastion_custom_image_ocid

  - title: "Topology"
    variables:
      - kove_namespace
      - kove_environment
      - defined_tag_namespace
      - host_label_prefix
      - availability_domain
      - rdma_deployment_mode
      - memory_node_count
      - enable_compute_system
      - compute_system_name
      - xpd_name
      - enable_bastion
      - enable_mc_instance

  - title: "Networking"
    variables:
      - use_existing_vcn
      - vcn_cidr_block
      - existing_vcn_id
      - existing_public_subnet_id
      - existing_private_subnet_id
      - ssh_ingress_cidr
      - public_ingress_hpc_ui_ports
      - private_subnet_ssh_sources_extras

  - title: "MC / management instance"
    variables:
      - mc_shape
      - mc_ocpus
      - mc_memory_gbs
      - mc_boot_volume_size_gbs
      - mc_assign_public_ip
      - mc_subnet_id
      - mc_availability_domain
      - mc_deployment_mode
      - mc_cloud_init_template_path
      - mc_setup_script_path
      - mc_guest_vm_name
      - mc_guest_vcpus
      - mc_guest_memory_mb

  - title: "Bastion"
    variables:
      - bastion_shape
      - bastion_ocpus
      - bastion_memory_gbs

  - title: "Bare metal"
    variables:
      - bm_node_shape
      - bm_boot_volume_size_gbs
      - bm_generic_platform_config
      - bm_smt_enabled
      - bm_numa_nodes_per_socket
      - use_compute_agent
      - bm_imds_ssh_key_bootstrap
      - bm_capacity_reservation_id
      - cluster_network_create_timeout
      - create_bm_console_connections

  - title: "Offline RPMs and cloud-init"
    variables:
      - rhsm_org_id
      - rhsm_activation_key
      - playbooks_zip_url
      - offline_repo_tarball_url
      - offline_repo_tarball_sha256
      - mc_offline_repo_tarball_url
      - mc_offline_repo_tarball_sha256

  - title: "Advanced"
    variables:
      - identity_home_region
      - cluster_placement_group_enabled
      - cluster_placement_group_type
      - cluster_placement_group_name
      - cluster_placement_group_description
      - cluster_network_enable_autoscaling
      - cluster_network_autoscaling_min_nodes
      - cluster_network_autoscaling_max_nodes
      - cluster_network_autoscaling_initial_nodes
      - cluster_network_autoscaling_cooldown_seconds
      - cluster_network_autoscaling_scale_out_threshold_percent
      - cluster_network_autoscaling_scale_in_threshold_percent
      - cluster_network_autoscaling_scale_out_by
      - cluster_network_autoscaling_scale_in_by

variables:
  tenancy_ocid:
    type: string
    title: "Tenancy OCID"
    description: "Set automatically when you create the stack in Resource Manager."
    required: true
    visible: false

  region:
    type: string
    title: "Region"
    description: "Set automatically when you create the stack in Resource Manager."
    required: true
    visible: false

  identity_home_region:
    type: string
    title: "Identity home region"
    description: "Home region for IAM API calls when it differs from region."
    default: "us-phoenix-1"
    required: false

  compartment_ocid:
    type: string
    title: "Compartment OCID"
    description: "Compartment where resources are created."
    required: true

  ssh_public_key:
    type: string
    title: "SSH public key"
    description: "Paste your public key in OpenSSH format."
    required: true

  rhel8_10_image_ocid:
    type: string
    title: "RHEL 8.10 image OCID"
    description: "Shared base RHEL 8.10 image for MC, bastion, compute-system, and RDMA memory nodes."
    required: true

  bm_node_custom_image_ocid:
    type: string
    title: "BM custom image OCID"
    description: "Optional override for RDMA memory nodes and compute-system. Empty uses the shared RHEL 8.10 image."
    default: ""
    required: false

  mc_custom_image_ocid:
    type: string
    title: "MC custom image OCID"
    description: "Optional override for the MC/management instance. Empty uses the shared RHEL 8.10 image."
    default: ""
    required: false

  bastion_custom_image_ocid:
    type: string
    title: "Bastion custom image OCID"
    description: "Optional override for the bastion. Empty uses the shared RHEL 8.10 image."
    default: ""
    required: false

  kove_namespace:
    type: string
    title: "Namespace"
    default: "kove"
    required: false

  kove_environment:
    type: string
    title: "Environment"
    default: "dev"
    required: false

  defined_tag_namespace:
    type: string
    title: "Defined tag namespace"
    description: "OCI defined tag namespace used for standard tags. The namespace and tag keys must already exist."
    default: "kove"
    required: false

  host_label_prefix:
    type: string
    title: "Hostname label prefix"
    default: ""
    required: false

  availability_domain:
    type: string
    title: "Availability domain"
    description: "Leave empty to derive from subnets or tenancy."
    default: ""
    required: false

  rdma_deployment_mode:
    type: string
    title: "RDMA deployment mode"
    description: "compute_cluster or cluster_network."
    default: "compute_cluster"
    required: false

  memory_node_count:
    type: number
    title: "RDMA memory node count"
    default: 2
    required: false

  enable_compute_system:
    type: boolean
    title: "Create compute-system BM"
    description: "Creates the optional single BM node labeled compute-system."
    default: true
    required: false

  compute_system_name:
    type: string
    title: "Compute-system role label"
    default: "compute-system"
    required: false

  xpd_name:
    type: string
    title: "Memory-node role label"
    default: "xpd"
    required: false

  enable_bastion:
    type: boolean
    title: "Create bastion"
    default: true
    required: false

  enable_mc_instance:
    type: boolean
    title: "Create MC/management instance"
    default: true
    required: false

  use_existing_vcn:
    type: boolean
    title: "Use existing VCN/subnets"
    default: false
    required: false

  vcn_cidr_block:
    type: string
    title: "VCN CIDR"
    default: "10.0.0.0/16"
    required: false
    visible:
      eq:
        - use_existing_vcn
        - false

  existing_vcn_id:
    type: string
    title: "Existing VCN OCID"
    default: ""
    required: false
    visible:
      eq:
        - use_existing_vcn
        - true

  existing_public_subnet_id:
    type: string
    title: "Existing public subnet OCID"
    default: ""
    required: false
    visible:
      eq:
        - use_existing_vcn
        - true

  existing_private_subnet_id:
    type: string
    title: "Existing private subnet OCID"
    default: ""
    required: false
    visible:
      eq:
        - use_existing_vcn
        - true

  ssh_ingress_cidr:
    type: string
    title: "SSH ingress CIDR"
    default: "0.0.0.0/0"
    required: false

  public_ingress_hpc_ui_ports:
    type: boolean
    title: "Allow public UI ports 3000/5000"
    default: true
    required: false

  private_subnet_ssh_sources_extras:
    type: string
    title: "Extra private subnet SSH CIDRs"
    default: ""
    required: false

  mc_shape:
    type: string
    title: "MC shape"
    default: "VM.Standard3.Flex"
    required: false

  mc_ocpus:
    type: number
    title: "MC OCPUs"
    default: 3
    required: false

  mc_memory_gbs:
    type: number
    title: "MC memory (GB)"
    default: 32
    required: false

  mc_boot_volume_size_gbs:
    type: number
    title: "MC boot volume size (GB)"
    default: 200
    required: false

  mc_assign_public_ip:
    type: boolean
    title: "Assign public IP to MC"
    default: false
    required: false

  mc_subnet_id:
    type: string
    title: "MC subnet OCID"
    description: "Leave empty to use the private subnet."
    default: ""
    required: false

  mc_availability_domain:
    type: string
    title: "MC availability domain"
    description: "Leave empty to use the platform AD."
    default: ""
    required: false

  mc_deployment_mode:
    type: string
    title: "MC deployment mode"
    description: "custom_image or cloud_init_setup."
    default: "custom_image"
    required: false

  mc_cloud_init_template_path:
    type: string
    title: "MC cloud-init template path"
    default: ""
    required: false

  mc_setup_script_path:
    type: string
    title: "MC setup script path"
    default: "/opt/kove/setup-kove-mc.sh"
    required: false

  mc_guest_vm_name:
    type: string
    title: "MC guest VM name"
    default: "kove-mc"
    required: false

  mc_guest_vcpus:
    type: number
    title: "MC guest vCPUs"
    default: 2
    required: false

  mc_guest_memory_mb:
    type: number
    title: "MC guest memory (MB)"
    default: 8192
    required: false

  bastion_shape:
    type: string
    title: "Bastion shape"
    default: "VM.Standard.E6.Flex"
    required: false

  bastion_ocpus:
    type: number
    title: "Bastion OCPUs"
    default: 2
    required: false

  bastion_memory_gbs:
    type: number
    title: "Bastion memory (GB)"
    default: 16
    required: false

  bm_node_shape:
    type: string
    title: "BM node shape"
    default: "BM.Optimized3.36"
    required: false

  bm_boot_volume_size_gbs:
    type: number
    title: "BM boot volume size (GB)"
    default: 120
    required: false

  bm_generic_platform_config:
    type: boolean
    title: "GENERIC_BM platform config"
    default: false
    required: false

  bm_smt_enabled:
    type: boolean
    title: "Enable SMT"
    default: true
    required: false

  bm_numa_nodes_per_socket:
    type: string
    title: "NUMA nodes per socket"
    default: "NPS1"
    required: false

  use_compute_agent:
    type: boolean
    title: "Enable OCI compute agent RDMA plugins"
    default: false
    required: false

  bm_imds_ssh_key_bootstrap:
    type: boolean
    title: "BM IMDS SSH key bootstrap"
    default: true
    required: false

  bm_capacity_reservation_id:
    type: string
    title: "BM capacity reservation OCID"
    default: ""
    required: false

  cluster_network_create_timeout:
    type: string
    title: "BM create timeout"
    default: ""
    required: false

  create_bm_console_connections:
    type: boolean
    title: "Enable BM console/VNC connections"
    default: false
    required: false

  rhsm_org_id:
    type: string
    title: "RHSM organization ID"
    default: ""
    required: false

  rhsm_activation_key:
    type: string
    title: "RHSM activation key"
    default: ""
    required: false

  playbooks_zip_url:
    type: string
    title: "Playbooks zip URL"
    default: ""
    required: false

  offline_repo_tarball_url:
    type: string
    title: "RDMA offline RPM tarball URL"
    default: ""
    required: false

  offline_repo_tarball_sha256:
    type: string
    title: "RDMA offline RPM tarball SHA256"
    default: ""
    required: false

  mc_offline_repo_tarball_url:
    type: string
    title: "MC offline RPM tarball URL"
    default: ""
    required: false

  mc_offline_repo_tarball_sha256:
    type: string
    title: "MC offline RPM tarball SHA256"
    default: ""
    required: false

  cluster_placement_group_enabled:
    type: boolean
    title: "Create cluster placement group"
    default: false
    required: false

  cluster_placement_group_type:
    type: string
    title: "Cluster placement group type"
    default: "STANDARD"
    required: false

  cluster_placement_group_name:
    type: string
    title: "Cluster placement group name"
    default: ""
    required: false

  cluster_placement_group_description:
    type: string
    title: "Cluster placement group description"
    default: ""
    required: false

  cluster_network_enable_autoscaling:
    type: boolean
    title: "Enable cluster-network autoscaling"
    default: false
    required: false

  cluster_network_autoscaling_min_nodes:
    type: number
    title: "Autoscaling min nodes"
    default: 1
    required: false

  cluster_network_autoscaling_max_nodes:
    type: number
    title: "Autoscaling max nodes"
    default: 8
    required: false

  cluster_network_autoscaling_initial_nodes:
    type: number
    title: "Autoscaling initial nodes"
    default: 2
    required: false

  cluster_network_autoscaling_cooldown_seconds:
    type: number
    title: "Autoscaling cooldown seconds"
    default: 300
    required: false

  cluster_network_autoscaling_scale_out_threshold_percent:
    type: number
    title: "Autoscaling scale-out threshold"
    default: 75
    required: false

  cluster_network_autoscaling_scale_in_threshold_percent:
    type: number
    title: "Autoscaling scale-in threshold"
    default: 30
    required: false

  cluster_network_autoscaling_scale_out_by:
    type: number
    title: "Autoscaling scale out by"
    default: 1
    required: false

  cluster_network_autoscaling_scale_in_by:
    type: number
    title: "Autoscaling scale in by"
    default: 1
    required: false
